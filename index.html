/* ===========================================================
   ROUTING
   =========================================================== */
function parseRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) return { name: 'home' };
  if (parts[0] === 'business' && parts[1] && !parts[2]) return { name: 'business', slug: parts[1] };
  if (parts[0] === 'business' && parts[1] && parts[2] === 'product' && parts[3]) {
    return { name: 'product', businessSlug: parts[1], productSlug: parts[3] };
  }
  return { name: 'home' };
}

function navigate(path) { window.location.hash = path; }
window.addEventListener('hashchange', render);
window.addEventListener('load', render);

/* ===========================================================
   ANALYTICS
   =========================================================== */
function fire(event, data = {}) {
  console.log('%c[Event]', 'color:#FF7B00;font-weight:bold', event, data);
  // Fathom: if(window.fathom) window.fathom.trackEvent(event, { _value: 0 });
  // HubSpot: if(window._hsq) window._hsq.push(['trackCustomBehavioralEvent', { name: event, properties: data }]);
}

/* ===========================================================
   RENDER
   =========================================================== */
function render() {
  const route = parseRoute();
  const app = document.getElementById('app');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (route.name === 'business') {
    const biz = BUSINESS_TYPES.find(b => b.slug === route.slug);
    if (!biz) { app.innerHTML = renderHome(); return; }
    app.innerHTML = renderBusiness(biz);
    fire('view_business', { business: biz.slug });
  } else if (route.name === 'product') {
    const biz = BUSINESS_TYPES.find(b => b.slug === route.businessSlug);
    const product = PRODUCTS[route.productSlug];
    if (!biz || !product) { app.innerHTML = renderHome(); return; }
    app.innerHTML = renderProduct(biz, route.productSlug, product);
    fire('view_product', { business: biz.slug, product: route.productSlug });
  } else {
    app.innerHTML = renderHome();
    fire('view_home');
  }
}

            <div class="p-6">
              <p class="text-tpi-stone text-sm leading-relaxed">${b.description}</p>
              <div class="mt-5 flex items-center justify-between">
                <div class="text-xs text-tpi-stone uppercase tracking-wider">${b.products.length} equipment categories</div>
                <div class="w-9 h-9 rounded-full bg-tpi-cream group-hover:bg-tpi-orange group-hover:text-white flex items-center justify-center transition-colors">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
              </div>
            </div>
          </a>
        `).join('')}
      </div>

      <div class="mt-12 text-center">
        <p class="text-tpi-stone text-sm">
          Don't see your business type?
          <a href="${spURL('other','not-listed')}" target="_blank" class="text-tpi-blue font-medium underline-grow ml-1">Tell us about your operation →</a>
        </p>
      </div>
    </section>

    <!-- Trust strip -->
    <section class="max-w-7xl mx-auto px-6 pb-16">
      <div class="bg-white rounded-2xl border border-tpi-ink/5 p-8 md:p-10 relative grain">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 relative z-10">
          <div>
            <div class="text-3xl font-bold text-tpi-blue">$174</div>
            <div class="text-xs text-tpi-stone mt-1 uppercase tracking-wider">Flat travel rate</div>
          </div>
          <div>
            <div class="text-3xl font-bold text-tpi-blue">96%+</div>
            <div class="text-xs text-tpi-stone mt-1 uppercase tracking-wider">Parts on truck</div>
          </div>
          <div>
            <div class="text-3xl font-bold text-tpi-blue">8am-8pm</div>
            <div class="text-xs text-tpi-stone mt-1 uppercase tracking-wider">Phone support, 7 days</div>
          </div>
          <div>
            <div class="text-3xl font-bold text-tpi-blue">1985</div>
            <div class="text-xs text-tpi-stone mt-1 uppercase tracking-wider">Serving NJ, NY, PA, DE</div>
          </div>
        </div>
      </div>
    </section>
  `;
}

/* ============== BUSINESS DETAIL ============== */
function renderBusiness(biz) {
  return `
    <section class="relative grain">
      <div class="absolute inset-0" style="background:${biz.fallback}">
        <img src="${biz.image}" alt="" class="w-full h-full object-cover opacity-40" onerror="this.style.display='none'" />
      </div>
      <div class="absolute inset-0 bg-gradient-to-r from-tpi-ink/85 via-tpi-ink/50 to-tpi-ink/30"></div>
      <div class="relative max-w-7xl mx-auto px-6 py-20 md:py-28 text-white z-10">
        <nav class="breadcrumb text-xs uppercase tracking-wider opacity-70 mb-6">
          <a href="#/" class="hover:text-tpi-orange">All Businesses</a>
          <span class="mx-2">/</span>
          <span>${biz.name}</span>
        </nav>
        <div class="max-w-2xl fade-in">
          <div class="text-sm uppercase tracking-wider text-tpi-orange font-medium mb-4">${biz.blurb}</div>
          <h1 class="text-5xl md:text-7xl font-bold tracking-tight leading-[1.02]">
            Equipment for <span class="font-serif-italic font-normal">${biz.name}s</span>
          </h1>
          <p class="mt-6 text-lg text-white/80 max-w-xl">${biz.description}</p>
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 py-16">
      <div class="flex items-baseline justify-between mb-8">
        <h2 class="text-2xl font-bold text-tpi-ink">Choose your equipment</h2>
        <div class="text-xs text-tpi-stone uppercase tracking-wider">${biz.products.length} categories</div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 stagger">
        ${biz.products.map(slug => {
          const p = PRODUCTS[slug];
          if (!p) return '';
          return `
            <a href="#/business/${biz.slug}/product/${slug}" class="card-hover img-zoom group block bg-white rounded-2xl overflow-hidden border border-tpi-ink/5">
              <div class="aspect-[5/3] overflow-hidden relative">
                <img src="${p.heroImg}" alt="${p.name}" class="w-full h-full object-cover absolute inset-0" loading="lazy" />
              </div>
              <div class="p-6">
                <div class="text-xs text-tpi-orange font-medium uppercase tracking-wider mb-1">${p.tagline}</div>
                <h3 class="text-xl font-bold text-tpi-ink leading-tight">${p.name}</h3>
                <p class="mt-2 text-sm text-tpi-stone leading-relaxed line-clamp-2">${p.summary}</p>
                <div class="mt-5 flex items-center justify-between">
                  <span class="text-sm font-medium text-tpi-blue group-hover:text-tpi-orange transition-colors">View details</span>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4 text-tpi-stone group-hover:text-tpi-orange group-hover:translate-x-1 transition-all"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
              </div>
            </a>
          `;
        }).join('')}
      </div>
    </section>
  `;
}

/* ============== PRODUCT DETAIL ============== */
function renderProduct(biz, productSlug, p) {
  const ctaUrl = spURL(biz.slug, productSlug);
  return `
    <section class="max-w-7xl mx-auto px-6 pt-10">
      <nav class="breadcrumb text-xs uppercase tracking-wider text-tpi-stone mb-8">
        <a href="#/" class="hover:text-tpi-orange">All Businesses</a>
        <span class="mx-2">/</span>
        <a href="#/business/${biz.slug}" class="hover:text-tpi-orange">${biz.name}</a>
        <span class="mx-2">/</span>
        <span class="text-tpi-ink">${p.name}</span>
      </nav>
    </section>

    <section class="max-w-7xl mx-auto px-6 pb-12 fade-in">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
        <!-- Product images -->
        <div class="sticky top-24 space-y-4">
          <div class="bg-white rounded-3xl border border-tpi-ink/5 overflow-hidden">
            <div class="aspect-[4/3] overflow-hidden">
              <img src="${p.heroImg}" alt="${p.name}" class="w-full h-full object-cover" />
            </div>
          </div>
          <div class="bg-white rounded-2xl border border-tpi-ink/5 overflow-hidden">
            <div class="aspect-[3/2] product-img-bg flex items-center justify-center p-10">
              <img src="${p.machineImg}" alt="${p.machineLabel}" class="max-h-full max-w-full object-contain drop-shadow-lg" />
            </div>
            <div class="px-6 py-3 border-t border-tpi-ink/5 text-center">
              <div class="text-xs text-tpi-stone">${p.machineLabel}</div>
            </div>
          </div>
        </div>

        <!-- Product info -->
        <div>
          <div class="pill bg-tpi-orange/10 text-tpi-orange-dark mb-5">For your ${biz.name}</div>
          <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-tpi-ink leading-[1.05]">${p.name}</h1>
          <p class="mt-5 text-lg text-tpi-stone leading-relaxed">${p.summary}</p>

          <div class="mt-10">
            <h3 class="text-sm font-semibold uppercase tracking-wider text-tpi-ink mb-5">Why operators choose it</h3>
            <ul class="space-y-3">
              ${p.benefits.map(b => `
                <li class="flex items-start gap-3">
                  <div class="mt-1 w-5 h-5 rounded-full bg-tpi-orange/15 flex items-center justify-center flex-shrink-0">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#FF7B00" stroke-width="3" class="w-3 h-3"><path d="M5 12l5 5L20 7"/></svg>
                  </div>
                  <span class="text-tpi-ink">${b}</span>
                </li>
              `).join('')}
            </ul>
          </div>

          <div class="mt-10 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <a href="https://finder.taylorproducts.net/wizard" target="_blank" onclick="fire('click_find_machine',{business:'${biz.slug}',product:'${productSlug}'})" class="px-6 py-4 bg-tpi-orange text-white font-medium rounded-lg hover:bg-tpi-orange-dark transition-colors flex items-center justify-center gap-2 text-center">
              Find Your Machine
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-4 h-4"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
            <a href="${ctaUrl}" target="_blank" onclick="fire('click_salesperson',{business:'${biz.slug}',product:'${productSlug}'})" class="px-6 py-4 border-2 border-tpi-ink text-tpi-ink font-medium rounded-lg hover:bg-tpi-ink hover:text-white transition-colors text-center">
              Talk to a Salesperson
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- Other products in this business -->
    <section class="max-w-7xl mx-auto px-6 py-16 border-t border-tpi-ink/10">
      <h2 class="text-2xl font-bold text-tpi-ink mb-8">Other equipment for ${biz.name}s</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 stagger">
        ${biz.products.filter(s => s !== productSlug).map(slug => {
          const op = PRODUCTS[slug];
          if (!op) return '';
          return `
            <a href="#/business/${biz.slug}/product/${slug}" class="card-hover group block bg-white rounded-xl border border-tpi-ink/5 p-4">
              <div class="aspect-square rounded-lg overflow-hidden relative mb-3">
                <img src="${op.heroImg}" alt="${op.name}" class="w-full h-full object-cover absolute inset-0" loading="lazy" />
              </div>
              <div class="font-semibold text-tpi-ink text-sm leading-tight">${op.name}</div>
              <div class="text-xs text-tpi-stone mt-1">${op.tagline}</div>

      </div>

}
</script>

</body>
