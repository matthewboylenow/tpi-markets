/* ===========================================================
   ROUTING — hash-based
   =========================================================== */

function parseRoute() {
  const hash = window.location.hash.replace('#', '') || '/';
  const parts = hash.split('/').filter(Boolean);
  if (parts.length === 0) return { name: 'home' };
  if (parts[0] === 'admin') return { name: 'admin' };
  if (parts[0] === 'business' && parts[1] && !parts[2]) return { name: 'business', slug: parts[1] };
  if (parts[0] === 'business' && parts[1] && parts[2] === 'product' && parts[3]) {
    return { name: 'product', businessSlug: parts[1], productSlug: parts[3] };
  }
  return { name: 'home' };
}

function navigate(path) {
  window.location.hash = path;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.addEventListener('hashchange', render);
window.addEventListener('load', render);

/* ===========================================================
   ANALYTICS — fired on every nav (mocked here, real wiring
   into Fathom + HubSpot in production)
   =========================================================== */

function fire(event, data = {}) {
  console.log('%c[Event]', 'color:#FF7B00;font-weight:bold', event, data);
  // production: window.fathom.trackEvent(event); hubspot._hsq.push([...]);
}

/* ===========================================================
   RENDER
   =========================================================== */

function render() {
  const route = parseRoute();
  const app = document.getElementById('app');
  if (route.name === 'home') {
    app.innerHTML = renderHome();
    fire('view_home');
  } else if (route.name === 'business') {
    const biz = BUSINESS_TYPES.find(b => b.slug === route.slug);
    if (!biz) { app.innerHTML = renderHome(); return; }
    app.innerHTML = renderBusiness(biz);
    fire('view_business', { business: biz.slug });
  } else if (route.name === 'product') {
    const biz = BUSINESS_TYPES.find(b => b.slug === route.businessSlug);
    const product = PRODUCTS[route.productSlug];
    if (!biz || !product) { app.innerHTML = renderHome(); return; }
    app.innerHTML = renderProduct(biz, route.productSlug, product);
    fire('view_product', { business: biz.slug, product: route.productSlug });
  } else if (route.name === 'admin') {
    app.innerHTML = renderAdmin();
  }
}

function showSuccessModal() {
  showModal(`
    <div class="bg-white rounded-2xl max-w-lg w-full p-10 text-center">
      <div class="w-16 h-16 rounded-full bg-tpi-orange/15 flex items-center justify-center mx-auto mb-5">

      <button onclick="closeModal()" class="mt-6 px-6 py-3 bg-tpi-ink text-white rounded-lg hover:bg-tpi-blue transition-colors">Done</button>
    </div>
  `);
}

function showModal(html) {
  document.getElementById('modal-root').innerHTML = `
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop fade-in" onclick="if(event.target===this)closeModal()">
      ${html}
    </div>
  `;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
  document.body.style.overflow = '';
}

// keyboard
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
